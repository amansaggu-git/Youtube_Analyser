<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Analyst — Aman's Research Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8541a;
    --accent2: #f0a500;
    --text: #e8e4dc;
    --muted: #888;
    --green: #4caf7d;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 300;
    min-height: 100vh;
    line-height: 1.7;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* Header */
  header {
    padding: 52px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }

  .logo-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .logo-label {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Source Serif 4', serif;
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 10px;
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
  }

  /* Input area */
  .input-section {
    margin-bottom: 32px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .url-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    font-family: 'Source Serif 4', serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .url-input::placeholder { color: #444; }
  .url-input:focus { border-color: var(--accent); }

  .analyze-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 14px 24px;
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }

  .analyze-btn:hover { background: #d44a14; transform: translateY(-1px); }
  .analyze-btn:active { transform: translateY(0); }
  .analyze-btn:disabled { background: #444; cursor: not-allowed; transform: none; }

  /* Status */
  .status {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 12px;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .status.visible { display: flex; }

  .status-spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status-step {
    display: inline-block;
    padding: 2px 8px;
    background: var(--surface2);
    border-radius: 4px;
    font-size: 0.75rem;
    color: var(--accent2);
    margin-left: auto;
  }

  /* Error */
  .error-box {
    display: none;
    padding: 14px 18px;
    background: #1a0a0a;
    border: 1px solid #5a1a1a;
    border-radius: 8px;
    margin-top: 12px;
    font-size: 0.85rem;
    color: #e07070;
  }

  .error-box.visible { display: block; }

  /* Result */
  #result {
    display: none;
    animation: fadeUp 0.5s ease;
  }

  #result.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .result-meta a {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.78rem;
  }

  .result-meta a:hover { text-decoration: underline; }

  .tag {
    padding: 3px 8px;
    background: var(--surface2);
    border-radius: 4px;
    font-size: 0.72rem;
    color: var(--green);
  }

  /* Analysis content */
  .analysis-body h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    margin: 36px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    line-height: 1.3;
  }

  .analysis-body h2:first-child { margin-top: 0; }

  .analysis-body p {
    font-size: 0.95rem;
    color: #ccc8c0;
    margin-bottom: 14px;
    line-height: 1.75;
  }

  .analysis-body ul {
    list-style: none;
    padding: 0;
    margin: 0 0 14px;
  }

  .analysis-body ul li {
    font-size: 0.92rem;
    color: #ccc8c0;
    padding: 8px 0 8px 20px;
    border-bottom: 1px solid #1e1e1e;
    line-height: 1.65;
    position: relative;
  }

  .analysis-body ul li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 1.1rem;
    line-height: 1.5;
  }

  .analysis-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 8px 0;
  }

  /* Takeaway section special styling */
  .takeaway-box {
    background: var(--surface);
    border-left: 3px solid var(--accent2);
    border-radius: 0 8px 8px 0;
    padding: 20px;
    margin-top: 8px;
  }

  .takeaway-box p {
    color: var(--text) !important;
    font-style: italic;
  }

  /* Copy button */
  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 24px;
    font-family: 'Source Serif 4', serif;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  footer {
    margin-top: 60px;
    padding: 24px 0;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 0.75rem;
    color: #444;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo-line">
      <div class="logo-dot"></div>
      <span class="logo-label">Investment Research Tool</span>
    </div>
    <h1>YouTube <span>Analyst</span></h1>
    <p class="subtitle">Drop a finance video URL. Get sharp, structured analysis built for your investing lens.</p>
  </header>

  <div class="input-section">
    <div class="input-row">
      <input
        type="text"
        class="url-input"
        id="urlInput"
        placeholder="https://youtube.com/watch?v=..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">Analyze →</button>
    </div>
    <div class="status" id="status">
      <div class="status-spinner"></div>
      <span id="statusMsg">Fetching transcript...</span>
      <span class="status-step" id="statusStep">step 1/2</span>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div id="result">
    <div class="result-meta">
      <span class="tag">✓ Analysis complete</span>
      <a id="ytLink" href="#" target="_blank">Open on YouTube ↗</a>
      <span id="segCount" style="margin-left:auto"></span>
    </div>
    <div class="analysis-body" id="analysisBody"></div>
    <button class="copy-btn" onclick="copyAnalysis()">⎘ Copy analysis</button>
  </div>

  <footer>Aman's YT Analyst · Powered by Gemini · Built for long-horizon equity investing</footer>

</div>

<script>
  // ── CONFIG — replace with your Render backend URL after deployment ──
  const BACKEND_URL = "https://youtube-analyser-r5bo.onrender.com";

  let lastAnalysis = "";

  async function analyze() {
    const url = document.getElementById("urlInput").value.trim();
    if (!url) return;

    const btn = document.getElementById("analyzeBtn");
    const status = document.getElementById("status");
    const errorBox = document.getElementById("errorBox");
    const result = document.getElementById("result");

    btn.disabled = true;
    errorBox.classList.remove("visible");
    result.classList.remove("visible");

    setStatus("Fetching transcript from YouTube…", "1/2");
    status.classList.add("visible");

    try {
      setStatus("Sending to Gemini for analysis…", "2/2");

      const res = await fetch(`${BACKEND_URL}/analyze`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Something went wrong");
      }

      status.classList.remove("visible");
      lastAnalysis = data.analysis;
      renderResult(data);

    } catch (err) {
      status.classList.remove("visible");
      errorBox.textContent = "⚠ " + err.message;
      errorBox.classList.add("visible");
    }

    btn.disabled = false;
  }

  function setStatus(msg, step) {
    document.getElementById("statusMsg").textContent = msg;
    document.getElementById("statusStep").textContent = "step " + step;
  }

  function renderResult(data) {
    document.getElementById("ytLink").href = `https://youtube.com/watch?v=${data.video_id}`;
    document.getElementById("segCount").textContent = `${data.segment_count} transcript segments`;

    const body = document.getElementById("analysisBody");
    body.innerHTML = markdownToHtml(data.analysis);

    // Wrap Aman's Takeaway in special box
    body.querySelectorAll("h2").forEach(h => {
      if (h.textContent.includes("Takeaway")) {
        const box = document.createElement("div");
        box.className = "takeaway-box";
        let next = h.nextElementSibling;
        while (next && next.tagName !== "H2") {
          const n = next.nextElementSibling;
          box.appendChild(next);
          next = n;
        }
        h.insertAdjacentElement("afterend", box);
      }
    });

    document.getElementById("result").classList.add("visible");
    document.getElementById("result").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function markdownToHtml(md) {
    return md
      .replace(/^---$/gm, "<hr>")
      .replace(/^## (.+)$/gm, "<h2>$1</h2>")
      .replace(/^### (.+)$/gm, "<h3>$1</h3>")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/^[-*] (.+)$/gm, "<li>$1</li>")
      .replace(/(<li>.*<\/li>)/s, (m) => "<ul>" + m + "</ul>")
      .replace(/(<li>[\s\S]*?<\/li>)/g, (m) => {
        if (!m.startsWith("<ul>")) return "<ul>" + m + "</ul>";
        return m;
      })
      // Clean up consecutive ul tags
      .replace(/<\/ul>\s*<ul>/g, "")
      .split("\n")
      .map(line => {
        line = line.trim();
        if (!line) return "";
        if (line.startsWith("<")) return line;
        return `<p>${line}</p>`;
      })
      .join("\n")
      .replace(/<p><\/p>/g, "");
  }

  function copyAnalysis() {
    if (!lastAnalysis) return;
    navigator.clipboard.writeText(lastAnalysis).then(() => {
      const btn = document.querySelector(".copy-btn");
      btn.textContent = "✓ Copied!";
      setTimeout(() => { btn.textContent = "⎘ Copy analysis"; }, 2000);
    });
  }

  // Allow Enter key
  document.getElementById("urlInput").addEventListener("keydown", e => {
    if (e.key === "Enter") analyze();
  });
</script>
</body>
</html>
